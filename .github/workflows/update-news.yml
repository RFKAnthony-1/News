name: Update news data

on:
  schedule:
    # 09:00 UTC = 5:00 AM US Eastern (EDT, UTC-4). During EST (UTC-5, winter)
    # this fires at 4:00 AM local instead — GitHub Actions cron is fixed UTC
    # and doesn't shift for daylight saving.
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node scripts/fetch-news.mjs

      - run: |
          git config user.name "news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update news data"
          git push
